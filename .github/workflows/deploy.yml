name: Deploy

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  deploy-slides:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare slides
        run: |
          mkdir -p deploy
          cp index.html deploy/
          cp -r dist deploy/
          cp -r plugin deploy/
          cp -r assets deploy/

      - name: Deploy to slides repo
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: deploy
