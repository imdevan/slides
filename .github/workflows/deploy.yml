name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy-slides:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare slides
        run: |
          mkdir -p deploy
          cp index.html deploy/
          cp -r dist deploy/
          cp -r plugin deploy/
          cp -r assets deploy/

      - name: Deploy to slides repo
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.DEPLOY_TOKEN }}
          external_repository: imdevan/slides
          publish_branch: gh-pages
          publish_dir: deploy

  deploy-notes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run build-notes
        run: npx tsx build-notes.ts

      - name: Prepare notes
        run: |
          mkdir -p deploy-notes
          cp notes/index.html deploy-notes/
          cp -r notes/dist deploy-notes/
          cp -r notes/plugin deploy-notes/
          cp -r notes/assets deploy-notes/

      - name: Deploy to d4js-notes repo
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.DEPLOY_TOKEN }}
          external_repository: imdevan/d4js-notes
          publish_branch: gh-pages
          publish_dir: deploy-notes
